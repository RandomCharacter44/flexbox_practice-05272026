<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Flexbox practice - 27.05.2026</title>
</head>
<body>
    <!-- start of "header" -->
     <div class="header">
        <p>.header</p>
     </div>
    <!-- end of "header" -->

    <div class="main-center-nested-boxes">
        <div class="main-content-sidebar-box">
            <!-- start of "main content" -->
                <div class="main-content">
                    <p>.main-content</p>
                </div>
            <!-- end of "main content" -->

            <!-- start of "sidebar" -->
                <div class="sidebar">
                    <p>.sidebar</p>
                </div>
            <!-- end of "sidebar" -->
        </div>

        <div class="twin-boxes-box">
            <!-- start of "twin" (left aligned) -->
                <div class="twin-left">
                    <p>.twin</p>
                </div>
            <!-- end of "twin" (left aligned) -->

            <!-- start of "twin" (right aligned) -->
                <div class="twin-right">
                    <p>.twin</p>
                </div>
            <!-- end of "twin" (right aligned) -->
        </div>
    </div>

    <!-- start of "footer" -->
     <div class="footer">
        <p>.footer</p>
     </div>
    <!-- end of "footer" -->
</body>
</html>
